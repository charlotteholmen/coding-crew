environment:
  properties:
    gitRootSearch: false

project:
  name: coding-crew
  versionPattern: SEMVER
  description: ACP-compatible coding assistant framework powered by LangChain4j.
  copyright: 2025 Charlie Mordant
  authors:
    - Charlie Mordant
  license: Apache-2.0
  inceptionYear: 2025
  java:
    groupId: net.osgiliath.ai
    version: 21
  links:
    homepage: https://github.com/OsgiliathEnterprise/coding-crew
  snapshot:
    pattern: .*-SNAPSHOT

platform:
  replacements:
    aarch_64: aarch64

release:
  github:
    enabled: true
    draft: true
    skipRelease: false
    skipTag: true
    overwrite: true
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        format: '- {{contributorName}}{{#contributorUsernameAsLink}} ({{.}}){{/contributorUsernameAsLink}}'

signing:
  active: ALWAYS
  armored: true
  verify: false

deploy:
  maven:
    mavenCentral:
      sonatype:
        active: RELEASE
        url: https://central.sonatype.com/api/v1/publisher
        stagingRepositories:
          - build/staging-deploy
        applyMavenCentralRules: true
        verifyPom: true

