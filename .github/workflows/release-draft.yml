name: Release Draft

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: release-draft-${{ github.ref }}
  cancel-in-progress: true

env:
  AGENT_SDK_VERSION: "0.0.8"
  BRIDGE_VERSION: "1.0.22"
  SPRING_PROFILES_ACTIVE: github
  MODEL_TOKEN: ${{ secrets.MODEL_TOKEN }}

jobs:
  draft:
    runs-on: ubuntu-latest
    name: Create GitHub Release Draft
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Resolve project version
        id: version
        run: |
          VERSION=$(./gradlew properties --no-daemon -q | grep "^version:" | awk '{print $2}')
          echo "project_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Build and stage artifacts
        run: |
          ./gradlew --no-daemon \
            clean assemble \
            :codeprompt:publishMavenJavaPublicationToStagingRepository \
            -PreleaseVersion=${{ steps.version.outputs.project_version }}

      - name: Create GitHub Release Draft with JReleaser
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.SIGNING_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.SIGNING_PASSWORD }}
          JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.project_version }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        run: |
          ./gradlew --no-daemon jreleaserRelease \
            -Pjreleaser.draft=true \
            -PreleaseVersion=${{ steps.version.outputs.project_version }}

      - name: Upload JReleaser logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-draft-logs
          path: |
            build/jreleaser/trace.log
            build/jreleaser/output.properties
          retention-days: 7

      - name: Add summary
        if: always()
        run: |
          {
            echo "## Release Draft"
            echo "- Version: ${{ steps.version.outputs.project_version }}"
            echo "- Draft created for: \`${{ github.sha }}\`"
            echo "- [View Releases](https://github.com/${{ github.repository }}/releases)"
          } >> "$GITHUB_STEP_SUMMARY"

