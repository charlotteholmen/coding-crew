name: Release to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release version (without v prefix), e.g. 1.2.3'
        required: true

env:
  JAVA_VERSION: '21'
  AGENT_SDK_VERSION: "0.0.8"
  BRIDGE_VERSION: "1.0.22"
  SPRING_PROFILES_ACTIVE: github
  MODEL_TOKEN: ${{ secrets.MODEL_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.releaseVersion }}"
          fi
          echo "release_version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify
        run: ./gradlew --no-daemon clean test -PreleaseVersion=${{ steps.version.outputs.release_version }}

      - name: Publish to Maven Central with JReleaser
        env:
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.SIGNING_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.SIGNING_PASSWORD }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        run: |
          ./gradlew --no-daemon \
            :codeprompt:publishMavenJavaPublicationToStagingRepository \
            jreleaserDeploy \
            -PreleaseVersion=${{ steps.version.outputs.release_version }}

      - name: Upload JReleaser output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-logs
          path: |
            build/jreleaser/trace.log
            build/jreleaser/output.properties

